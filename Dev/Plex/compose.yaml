# Start containers:
#   docker compose up --detach

services:
  plex:
    container_name: plex
    image: lscr.io/linuxserver/plex:1.41.4    # pinned - bump deliberately
    restart: unless-stopped
    networks: 
      - plex_net
    runtime: nvidia
    env_file:
      - .env
    ports:
      - "32400:32400/tcp"    # bridge mode; no GDM/DLNA needed
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${time_zone}
      HOSTNAME: ${Plex_Hostname}
      VERSION: docker
      ADVERTISE_IP: ${Plex_Advertise}
      ALLOWED_NETWORKS: ${Plex_Allowed_Nets}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    volumes:
      - '${Plex_Config}:/config'        # /opt/plex/config - LOCAL disk on purpose
      - '${Plex_Transcode}:/transcode'  # /dev/shm - transcode in RAM
      - '${Plex_Media}:/media'          # /mnt/unas2/media/Plex - rw (in-app deletes)

networks:
  plex_net:
    name: plex_net
    driver: bridge